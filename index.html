<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>06/06/2026</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --accent: #F5A623;
      --bg: #000;
      --font-display: 'Bebas Neue', sans-serif;
      --font-mono: 'Space Mono', monospace;
      --header-h: 60px;
      --footer-h: 90px;
    }

    html, body {
      width: 100%; height: 100%;
      background: var(--bg);
      color: var(--accent);
      font-family: var(--font-mono);
      overflow: hidden;
    }

    /* ══════════════════════════════
       DESKTOP LAYOUT
    ══════════════════════════════ */
    .site {
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ── HEADER ── */
    .info-bar {
      width: 100%;
      height: var(--header-h);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 3vw;
      position: relative;
      z-index: 10;
      pointer-events: none;
    }
    .info-bar .ptr { pointer-events: auto; cursor: pointer; }

    .info-date, .info-counter {
      font-family: var(--font-mono);
      font-size: clamp(11px, 1.3vw, 17px);
      color: var(--accent);
      letter-spacing: 0.05em;
    }
    .info-counter {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
    }

    .active-picto {
      width: clamp(36px, 4.5vw, 62px);
      height: clamp(36px, 4.5vw, 62px);
      object-fit: contain;
      opacity: 0;
      transition: opacity 0.4s ease;
    }
    .active-picto.visible { opacity: 1; }

    /* ── VIDEO ZONE ── */
    .video-zone {
      flex: 1 1 0;
      min-height: 0;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 2vw;
    }

    .video-wrapper {
      position: relative;
      /* S'adapte à l'espace dispo entre header et footer */
      width: min(
        calc(100vw - 4vw),
        calc((100vh - var(--header-h) - var(--footer-h)) * 16 / 9)
      );
      aspect-ratio: 16 / 9;
      overflow: hidden;
    }

    video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      opacity: 0;
      transition: opacity 0.5s ease;
    }
    video.active { opacity: 1; }

    /* ── PICTOS BAR ── */
    .pictos-bar {
      width: 100%;
      height: var(--footer-h);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: clamp(16px, 2.5vw, 36px);
      z-index: 10;
    }

    .picto-btn {
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      width: clamp(42px, 5vw, 68px);
      height: clamp(42px, 5vw, 68px);
      opacity: 0.5;
      transition: opacity 0.25s ease, transform 0.25s ease;
      flex-shrink: 0;
    }
    .picto-btn img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }
    .picto-btn:hover { opacity: 1; transform: scale(1.1); }
    .picto-btn.active-btn { opacity: 0; pointer-events: none; }

    /* ══════════════════════════════
       MOBILE LAYOUT  (≤ 600px)
       Interface verticale : vidéo en
       haut, pictos en bas bien visibles
    ══════════════════════════════ */
    @media (max-width: 600px) {
      :root {
        --header-h: 48px;
        --footer-h: 110px;
      }

      .info-date, .info-counter {
        font-size: 11px;
      }

      /* Pictos : taille fixe 56px, pas de shrink */
      .picto-btn {
        width: 56px;
        height: 56px;
        opacity: 0.6;
      }

      .pictos-bar {
        gap: 20px;
        padding: 0 16px;
      }

      .active-picto {
        width: 36px;
        height: 36px;
      }
    }

    /* ── TRANSITION OVERLAY ── */
    .transition-overlay {
      position: fixed;
      inset: 0;
      background: #000;
      opacity: 0;
      pointer-events: none;
      z-index: 200;
      transition: opacity 0.2s ease;
    }
    .transition-overlay.flash { opacity: 0.6; }
  </style>
</head>
<body>

<div class="transition-overlay" id="overlay"></div>

<div class="site">

  <!-- Header -->
  <div class="info-bar">
    <span class="info-date">06/06/2026</span>
    <span class="info-counter" id="counter">—</span>
    <img class="active-picto ptr" id="activePicto" src="" alt="" />
  </div>

  <!-- Vidéo -->
  <div class="video-zone">
    <div class="video-wrapper">
      <video id="v-base"    src="videos/base.mp4"          loop playsinline preload="auto"></video>
      <video id="v-miss"    src="videos/miss-misery.mp4"   loop playsinline preload="metadata"></video>
      <video id="v-through" src="videos/through.mp4"       loop playsinline preload="metadata"></video>
      <video id="v-points"  src="videos/ill-try.mp4"       loop playsinline preload="metadata"></video>
      <video id="v-nuage"   src="videos/fake-plastic.mp4"  loop playsinline preload="metadata"></video>
    </div>
  </div>

  <!-- Pictos -->
  <div class="pictos-bar" id="pictosBar">
    <button class="picto-btn" id="btn-1" onclick="switchMood('miss')"    title="Miss Misery">
      <img src="visuels/Picto_1.png" alt="Mixed" />
    </button>
    <button class="picto-btn" id="btn-2" onclick="switchMood('through')" title="Through">
      <img src="visuels/Picto_2.png" alt="Glitch" />
    </button>
    <button class="picto-btn" id="btn-3" onclick="switchMood('points')"  title="I'll Try Anything Once">
      <img src="visuels/Picto_3.png" alt="Points" />
    </button>
    <button class="picto-btn" id="btn-4" onclick="switchMood('nuage')"   title="Fake Plastic Trees">
      <img src="visuels/Picto_4.png" alt="Nuage" />
    </button>
  </div>

</div>

<script>
  const COUPLE_DATE = new Date('2026-05-10T00:00:00');

  const MOODS = {
    base:    { videoId: 'v-base',    picto: null,                  btnId: null },
    miss:    { videoId: 'v-miss',    picto: 'visuels/Picto_1.png', btnId: 'btn-1' },
    through: { videoId: 'v-through', picto: 'visuels/Picto_2.png', btnId: 'btn-2' },
    points:  { videoId: 'v-points',  picto: 'visuels/Picto_3.png', btnId: 'btn-3' },
    nuage:   { videoId: 'v-nuage',   picto: 'visuels/Picto_4.png', btnId: 'btn-4' },
  };

  let currentMood = 'base';
  let isTransitioning = false;

  // ── COMPTEUR ──
  function updateCounter() {
    const now = new Date();
    const diffMs = now - COUPLE_DATE;
    if (diffMs < 0) { document.getElementById('counter').textContent = 'bientôt...'; return; }
    const totalDays = Math.floor(diffMs / 86400000);
    const months = Math.floor(totalDays / 30.44);
    const el = document.getElementById('counter');
    if (months === 0)      el.textContent = `${totalDays} jour${totalDays > 1 ? 's' : ''}`;
    else if (months === 1) el.textContent = `1 mois`;
    else                   el.textContent = `${months} mois`;
  }
  updateCounter();
  setInterval(updateCounter, 60000);

  // ── AUTOPLAY ──
  const baseVideo = document.getElementById('v-base');
  baseVideo.classList.add('active');
  baseVideo.muted = true;
  baseVideo.play().catch(() => {});

  const unmute = () => { baseVideo.muted = false; };
  document.addEventListener('click',    unmute, { once: true });
  document.addEventListener('touchend', unmute, { once: true });

  // ── SWITCH MOOD ──
  function switchMood(moodKey) {
    if (moodKey === currentMood || isTransitioning) return;
    isTransitioning = true;

    const overlay = document.getElementById('overlay');
    overlay.classList.add('flash');

    setTimeout(() => {
      const prevMood = MOODS[currentMood];
      const nextMood = MOODS[moodKey];
      const prevVideo = document.getElementById(prevMood.videoId);
      const nextVideo = document.getElementById(nextMood.videoId);

      const doSwap = () => {
        // On lit le timestamp ICI, au dernier moment, juste avant de pauser
        const syncTime = prevVideo.currentTime;
        prevVideo.classList.remove('active');
        prevVideo.pause();
        nextVideo.currentTime = syncTime; // re-sync au moment exact du swap
        nextVideo.classList.add('active');
        nextVideo.addEventListener('seeked', () => {
          nextVideo.muted = false;
          nextVideo.play().catch(() => {});
        }, { once: true });

        const activePicto = document.getElementById('activePicto');
        if (nextMood.picto) { activePicto.src = nextMood.picto; activePicto.classList.add('visible'); }
        else                 { activePicto.classList.remove('visible'); }

        document.querySelectorAll('.picto-btn').forEach(b => b.classList.remove('active-btn'));
        if (nextMood.btnId) document.getElementById(nextMood.btnId).classList.add('active-btn');

        currentMood = moodKey;
        overlay.classList.remove('flash');
        isTransitioning = false;
      };

      if (nextVideo.readyState >= 1) {
        // Vidéo déjà chargée : doSwap s'occupe du seek au dernier moment
        doSwap();
      } else {
        // Vidéo pas encore chargée : on attend le chargement, puis doSwap
        nextVideo.addEventListener('loadedmetadata', () => {
          doSwap();
        }, { once: true });
        nextVideo.load();
      }
    }, 200);
  }

  document.getElementById('activePicto').addEventListener('click', () => switchMood('base'));
</script>
</body>
</html>
